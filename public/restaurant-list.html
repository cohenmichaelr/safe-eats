<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Eats USA - Restaurant Directory</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a73e8;
            --text: #202124;
            --text-secondary: #70757a;
            --border: #dadce0;
            --surface: #ffffff;
            --background: #f8f9fa;
        }

        body {
            font-family: 'Google Sans', Roboto, Arial, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        header {
            max-width: 1200px;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { font-weight: 400; font-size: 1.5rem; }

        .back-link {
            text-decoration: none;
            color: var(--primary);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--surface);
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(60,64,67,0.3);
            overflow: hidden;
        }

        .controls {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 16px;
            align-items: center;
            background: white;
        }

        input[type="text"] {
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: 4px;
            flex: 1;
            font-size: 0.9rem;
            outline: none;
        }
        input[type="text"]:focus { border-color: var(--primary); }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th {
            text-align: left;
            padding: 12px 16px;
            background: #f1f3f4;
            color: var(--text-secondary);
            font-weight: 500;
            cursor: pointer;
            user-select: none;
            position: sticky;
            top: 0;
        }
        th:hover { background: #e8eaed; color: var(--text); }
        th.sort-asc::after { content: ' ↑'; }
        th.sort-desc::after { content: ' ↓'; }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }

        tr:hover { background: #f8f9fa; }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .badge-success { background-color: #e6f4ea; color: #1e8e3e; }
        .badge-warning { background-color: #fef7e0; color: #b05e00; }
        .badge-danger { background-color: #fce8e6; color: #d93025; }
        .badge-secondary { background-color: #f1f3f4; color: #70757a; }

        .loading {
            padding: 40px;
            text-align: center;
            color: var(--text-secondary);
        }

        .violation-cell { font-weight: 500; text-align: center; }
        .has-violations { background-color: #fff8f8; }
        .row-clickable { cursor: pointer; transition: background-color 0.2s; }
        .row-clickable:hover { background-color: #f1f3f4 !important; }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 8px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .violation-item {
            margin-bottom: 12px;
            padding: 12px;
            border-radius: 4px;
            background: #f8f9fa;
            border-left: 4px solid var(--primary);
        }

        .violation-date { font-weight: bold; font-size: 0.85rem; color: var(--text-secondary); }
        .violation-status { font-size: 0.9rem; margin: 4px 0; }
        .violation-count { color: #d93025; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>🛡️ Florida Restaurant Directory</h1>
    <a href="/" class="back-link">⬅ Back to Interactive Map</a>
</header>

<div class="container">
    <div class="controls">
        <input type="text" id="filterInput" placeholder="Search by name, city (e.g. 'Boca Raton'), address, or type...">
        <button class="action-link" onclick="fetchData()" style="background: none; border: 1px solid var(--border); padding: 8px 16px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 0.85rem;">🔄 Refresh List</button>
        <button class="action-link" onclick="triggerSync()" style="background: none; border: 1px solid var(--border); padding: 8px 16px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 0.85rem; color: var(--primary);">📥 Sync from Florida DB</button>
        <div id="stats" style="font-size: 0.85rem; color: var(--text-secondary); margin-left: auto;">Loading data...</div>
    </div>

    <table id="restaurantTable">
        <thead>
            <tr>
                <th onclick="sortTable(0)">Restaurant Name</th>
                <th onclick="sortTable(1)">City</th>
                <th onclick="sortTable(2)">Type</th>
                <th onclick="sortTable(3)">Status</th>
                <th onclick="sortTable(4)">Violations</th>
                <th onclick="sortTable(5)">Last Inspection</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- Data rows will be injected here -->
        </tbody>
    </table>
    <div id="loading" class="loading">Fetching records from database...</div>
</div>

<div id="violationModal" class="modal-overlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            <div>
                <h2 id="modalTitle" style="margin: 0;">Restaurant Name</h2>
                <p id="modalAddress" style="margin: 4px 0 0 0; color: var(--text-secondary); font-size: 0.9rem;">Address info</p>
            </div>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div id="modalBody">
            <p>Loading inspection history...</p>
        </div>
    </div>
</div>

<script>
    let restaurants = [];
    let currentSort = { column: null, direction: 'asc' };

    async function fetchData() {
        try {
            const res = await fetch('/api/restaurants/all');
            const data = await res.json();
            restaurants = data.results || [];
            document.getElementById('loading').style.display = 'none';
            renderTable(restaurants);
            updateStats(restaurants.length);
        } catch (err) {
            document.getElementById('loading').innerText = 'Failed to load data.';
        }
    }

    function renderTable(data) {
        const body = document.getElementById('tableBody');
        const limit = 1000;
        const displayData = data.slice(0, limit);
        
        if (data.length > limit) {
            document.getElementById('stats').innerText = `Showing first ${limit} of ${data.length} locations (Use filter to narrow down)`;
        } else {
            updateStats(data.length);
        }

        body.innerHTML = displayData.map((r, index) => {
            const status = (r.status || 'Unknown').toLowerCase();
            let badgeClass = 'secondary';
            if (status.includes('satisfactory') || status.includes('met')) badgeClass = 'success';
            else if (status.includes('warning')) badgeClass = 'warning';
            else if (status.includes('fail') || status.includes('closed')) badgeClass = 'danger';

            const hasViolations = r.violation_count > 0;
            const rowClass = `row-clickable ${hasViolations ? 'has-violations' : ''}`;

            return `
                <tr class="${rowClass}" onclick="showViolations('${encodeURIComponent(r.name)}', '${encodeURIComponent(r.address)}', '${r.source}')">
                    <td style="font-weight: 500;">${r.name}</td>
                    <td>${r.city || 'N/A'}</td>
                    <td style="color: var(--text-secondary); font-size: 0.8rem;">${r.type}</td>
                    <td><span class="badge badge-${badgeClass}">${r.status}</span></td>
                    <td class="violation-cell" style="color: ${r.violation_count > 5 ? '#d93025' : (r.violation_count > 0 ? '#b05e00' : 'inherit')}">
                        ${r.violation_count}
                    </td>
                    <td style="color: var(--text-secondary);">${r.last_inspection_date || 'N/A'}</td>
                </tr>
            `;
        }).join('');
    }

    async function showViolations(name, address, source) {
        const modal = document.getElementById('violationModal');
        const title = document.getElementById('modalTitle');
        const addrElem = document.getElementById('modalAddress');
        const body = document.getElementById('modalBody');

        title.innerText = decodeURIComponent(name);
        addrElem.innerText = decodeURIComponent(address);
        body.innerHTML = '<p style="text-align: center; padding: 20px;">🔍 Fetching detailed inspection history...</p>';
        modal.style.display = 'flex';

        try {
            const url = `/health?name=${name}&address=${address}&source=${source}`;
            const res = await fetch(url);
            const data = await res.json();

            if (data.status === 'Found' && data.history && data.history.length > 0) {
                body.innerHTML = data.history.map(h => `
                    <div class="violation-item" style="border-left-color: ${h.violations > 5 ? '#d93025' : (h.violations > 0 ? '#fbbc04' : '#1e8e3e')}">
                        <div class="violation-date">${h.date} - ${h.type}</div>
                        <div class="violation-status">Status: <strong>${h.status}</strong></div>
                        <div class="violation-status">Violations found: <span class="violation-count">${h.violations}</span></div>
                    </div>
                `).join('');
            } else {
                body.innerHTML = '<p style="text-align: center; color: var(--text-secondary);">No detailed history available for this location.</p>';
            }
        } catch (err) {
            body.innerHTML = '<p style="color: #d93025;">Error loading violation details.</p>';
        }
    }

    function closeModal() {
        document.getElementById('violationModal').style.display = 'none';
    }

    function sortTable(columnIndex) {
        const headers = document.querySelectorAll('th');
        const columnKeys = ['name', 'city', 'type', 'status', 'violation_count', 'last_inspection_date'];
        const key = columnKeys[columnIndex];

        // Reset headers
        headers.forEach(h => h.className = '');

        if (currentSort.column === key) {
            currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
        } else {
            currentSort.column = key;
            currentSort.direction = 'asc';
        }

        headers[columnIndex].className = currentSort.direction === 'asc' ? 'sort-asc' : 'sort-desc';

        const sortedData = [...restaurants].sort((a, b) => {
            let valA = a[key] === null || a[key] === undefined ? '' : a[key];
            let valB = b[key] === null || b[key] === undefined ? '' : b[key];

            if (key === 'violation_count') {
                return currentSort.direction === 'asc' ? valA - valB : valB - valA;
            }

            if (key === 'last_inspection_date') {
                const dateA = new Date(valA);
                const dateB = new Date(valB);
                if (!isNaN(dateA) && !isNaN(dateB)) {
                    return currentSort.direction === 'asc' ? dateA - dateB : dateB - dateA;
                }
            }

            valA = valA.toString().toLowerCase();
            valB = valB.toString().toLowerCase();

            if (valA < valB) return currentSort.direction === 'asc' ? -1 : 1;
            if (valA > valB) return currentSort.direction === 'asc' ? 1 : -1;
            return 0;
        });

        renderTable(sortedData);
    }

    function updateStats(count) {
        document.getElementById('stats').innerText = `Showing ${count} locations`;
    }

    async function triggerSync() {
        if (confirm('Sync with Florida Health Database? This will refresh all records in the background.')) {
            try {
                await fetch('/admin/rebuild-db', { method: 'POST' });
                alert('Database synchronization started. Refresh the list in a few minutes to see updates.');
            } catch (err) {
                alert('Sync failed to start.');
            }
        }
    }

    document.getElementById('filterInput').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = restaurants.filter(r => 
            r.name.toLowerCase().includes(term) || 
            (r.city && r.city.toLowerCase().includes(term)) ||
            (r.address && r.address.toLowerCase().includes(term)) ||
            r.type.toLowerCase().includes(term)
        );
        renderTable(filtered);
        updateStats(filtered.length);
    });

    fetchData();
</script>

</body>
</html>


</body>
</html>
